name: pet-parent-ci

on:
  push:
    branches: [main, integration]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build app
        run: npm run build

      - name: Build container
        run: docker build -t pawit-vetcare-pet-parent:${{ github.sha }} .
